<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Casa Budget 🏡</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0b0d14; --bg2:#0f1221; --card:rgba(255,255,255,0.04);
    --bdr:rgba(255,255,255,0.08); --tx:#e2e8f0; --mt:#64748b;
    --gr:#4ade80; --rd:#f87171; --bl:#60a5fa; --pu:#a78bfa;
    --font:'DM Sans',sans-serif;
  }
  html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);}
  body{background:linear-gradient(160deg,#0b0d14 0%,#0f1221 50%,#080f1c 100%);min-height:100vh;padding-bottom:90px;}

  #header{position:sticky;top:0;z-index:100;background:rgba(11,13,20,0.88);backdrop-filter:blur(20px);padding:14px 16px 0;border-bottom:1px solid var(--bdr);}
  .logo-row{display:flex;align-items:center;gap:10;margin-bottom:12px;}
  .logo-text{font-size:1.2rem;font-weight:900;background:linear-gradient(90deg,#4ade80,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-left:8px;}
  .nav-row{display:flex;gap:2px;overflow-x:auto;padding-bottom:0;}
  .nav-btn{flex-shrink:0;padding:9px 11px;border-radius:8px 8px 0 0;border:none;cursor:pointer;font-size:0.7rem;font-weight:700;color:var(--mt);background:transparent;border-bottom:2px solid transparent;}
  .nav-btn.active{background:rgba(255,255,255,0.08);color:var(--tx);border-bottom:2px solid var(--gr);}

  #body{padding:14px;}
  .card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-bottom:12px;}
  .card-title{font-size:0.88rem;font-weight:800;margin-bottom:12px;color:var(--tx);}
  label.lbl{display:block;font-size:0.66rem;color:var(--mt);font-weight:700;text-transform:uppercase;margin-bottom:5px;}
  .inp, .sel{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:10px;padding:10px;color:var(--tx);margin-bottom:8px;font-family:var(--font);}
  
  .btn-green{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,#15803d,#4ade80);color:#052e16;font-weight:800;cursor:pointer;}
  .btn-blue{width:100%;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,#1e40af,#60a5fa);color:#fff;font-weight:800;cursor:pointer;}
  
  .stat-row{display:flex;gap:10px;margin-bottom:12px;}
  .stat-card{flex:1;border-radius:13px;padding:12px 14px;border:1px solid var(--bdr);}
  .stat-num{font-size:1.4rem;font-weight:900;margin-bottom:2px;}
  .stat-lbl{font-size:0.63rem;color:rgba(255,255,255,0.5);font-weight:600;text-transform:uppercase;}

  .item-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bdr);}
  .view{display:none;}
  .view.active{display:block;}
</style>
</head>
<body>

<div id="header">
  <div class="logo-row">
    <span class="logo-emoji">🏡</span>
    <span class="logo-text">Casa Budget</span>
    <span id="hdr-date" style="margin-left:auto; font-size:0.7rem; color:var(--mt)"></span>
  </div>
  <div class="nav-row">
    <button class="nav-btn active" data-view="inicio" onclick="setView('inicio')">🏠 Inicio</button>
    <button class="nav-btn" data-view="gastos" onclick="setView('gastos')">💸 Gastos</button>
    <button class="nav-btn" data-view="ingresos" onclick="setView('ingresos')">💰 Ingresos</button>
  </div>
</div>

<div id="body">
  <div id="view-inicio" class="view active">
    <div class="stat-row">
      <div class="stat-card" style="background:rgba(74,222,128,0.1); border-color:rgba(74,222,128,0.2)">
        <div class="stat-num" style="color:var(--gr)" id="ini-tot-i">0,00 €</div>
        <div class="stat-lbl">Ingresos</div>
      </div>
      <div class="stat-card" style="background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.2)">
        <div class="stat-num" style="color:var(--rd)" id="ini-tot-g">0,00 €</div>
        <div class="stat-lbl">Gastos</div>
      </div>
    </div>
    <div class="card" id="ini-ahorro-card">
      <label class="lbl">Balance Total</label>
      <div id="ini-ahorro-num" style="font-size:2rem; font-weight:900;">0,00 €</div>
    </div>
    <div class="card">
      <div class="card-title">Últimos movimientos</div>
      <div id="ini-list">Cargando datos...</div>
    </div>
  </div>

  <div id="view-gastos" class="view">
    <div class="card">
      <div class="card-title">➕ Nuevo Gasto</div>
      <input class="inp" id="g-desc" placeholder="¿En qué gastaste?"/>
      <input class="inp" id="g-imp" type="number" placeholder="Importe €"/>
      <select class="sel" id="g-cat"></select>
      <input class="inp" id="g-fecha" type="date"/>
      <button class="btn-green" onclick="saveGasto()">Guardar Gasto</button>
    </div>
    <div class="card"><div id="g-list"></div></div>
  </div>

  <div id="view-ingresos" class="view">
    <div class="card">
      <div class="card-title">➕ Nuevo Ingreso</div>
      <input class="inp" id="i-desc" placeholder="Origen del dinero"/>
      <input class="inp" id="i-imp" type="number" placeholder="Importe €"/>
      <select class="sel" id="i-cat"></select>
      <input class="inp" id="i-fecha" type="date"/>
      <button class="btn-blue" onclick="saveIngreso()">Guardar Ingreso</button>
    </div>
    <div class="card"><div id="i-list"></div></div>
  </div>
</div>

<script>
// --- CONEXIÓN SUPABASE ---
const supabaseUrl = 'https://lbijwoqjuvsbqyjojila.supabase.co';
const supabaseKey = 'sb_publishable_Pp83X9RvHF7iIE6VHywoiQ_LAaoYPXh';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let gastos = [], ingresos = [];

async function fetchData() {
  const { data: gData } = await supabaseClient.from('gastos').select('*').order('date', { ascending: false });
  const { data: iData } = await supabaseClient.from('ingresos').select('*').order('date', { ascending: false });
  gastos = gData || [];
  ingresos = iData || [];
  renderAll();
}

const fmt = n => n.toLocaleString("es-ES",{minimumFractionDigits:2}) + " €";

function renderAll() {
  const totG = gastos.reduce((s,x) => s + x.amount, 0);
  const totI = ingresos.reduce((s,x) => s + x.amount, 0);
  const bal = totI - totG;

  document.getElementById('ini-tot-i').textContent = fmt(totI);
  document.getElementById('ini-tot-g').textContent = fmt(totG);
  document.getElementById('ini-ahorro-num').textContent = fmt(bal);
  document.getElementById('ini-ahorro-num').style.color = bal >= 0 ? 'var(--gr)' : 'var(--rd)';

  const combined = [...gastos.map(x=>({...x,t:'g'})), ...ingresos.map(x=>({...x,t:'i'}))]
                  .sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,10);
  
  document.getElementById('ini-list').innerHTML = combined.map(it => `
    <div class="item-row">
      <div style="flex:1">
        <div style="font-weight:600; font-size:0.85rem">${it.description}</div>
        <div style="font-size:0.65rem; color:var(--mt)">${it.date}</div>
      </div>
      <div style="font-weight:800; color:${it.t==='g'?'var(--rd)':'var(--gr)'}">
        ${it.t==='g'?'-':'+'} ${fmt(it.amount)}
      </div>
    </div>
  `).join('');

  if(currentView === 'gastos') {
    document.getElementById('g-list').innerHTML = gastos.map(g => `
      <div class="item-row">
        <div style="flex:1"><b>${g.description}</b><br><small>${g.date}</small></div>
        <div style="color:var(--rd)">-${fmt(g.amount)}</div>
      </div>
    `).join('');
  }
  if(currentView === 'ingresos') {
    document.getElementById('i-list').innerHTML = ingresos.map(i => `
      <div class="item-row">
        <div style="flex:1"><b>${i.description}</b><br><small>${i.date}</small></div>
        <div style="color:var(--gr)">+${fmt(i.amount)}</div>
      </div>
    `).join('');
  }
}

async function saveGasto() {
  const description = document.getElementById('g-desc').value;
  const amount = parseFloat(document.getElementById('g-imp').value);
  const category = document.getElementById('g-cat').value;
  const date = document.getElementById('g-fecha').value;
  if(!description || !amount) return;
  await supabaseClient.from('gastos').insert([{ id: Date.now(), description, amount, category, date }]);
  document.getElementById('g-desc').value = ''; document.getElementById('g-imp').value = '';
  fetchData();
}

async function saveIngreso() {
  const description = document.getElementById('i-desc').value;
  const amount = parseFloat(document.getElementById('i-imp').value);
  const category = document.getElementById('i-cat').value;
  const date = document.getElementById('i-fecha').value;
  if(!description || !amount) return;
  await supabaseClient.from('ingresos').insert([{ id: Date.now(), description, amount, category, date }]);
  document.getElementById('i-desc').value = ''; document.getElementById('i-imp').value = '';
  fetchData();
}

let currentView = 'inicio';
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`[data-view="${v}"]`).classList.add('active');
  renderAll();
}

document.getElementById('hdr-date').textContent = new Date().toLocaleDateString();
document.getElementById('g-fecha').value = new Date().toISOString().split('T')[0];
document.getElementById('i-fecha').value = new Date().toISOString().split('T')[0];
const catsG = ["Comida", "Casa", "Ocio", "Transporte", "Otros"];
const catsI = ["Nómina", "Venta", "Regalo", "Otros"];
document.getElementById('g-cat').innerHTML = catsG.map(c => `<option value="${c}">${c}</option>`).join('');
document.getElementById('i-cat').innerHTML = catsI.map(c => `<option value="${c}">${c}</option>`).join('');

fetchData();
setInterval(fetchData, 15000); // Sincroniza cada 15 seg
</script>
</body>
</html>
